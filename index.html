<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  var wrap=document.getElementById('gw');
  var canvas=document.getElementById('gc');
  var W=wrap.clientWidth;
  var H=wrap.clientHeight;

  var renderer=new THREE.WebGLRenderer({canvas:canvas,antialias:true,alpha:false,powerPreference:"high-performance"});
  renderer.setSize(W,H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));

  var scene=new THREE.Scene();
  var camera=new THREE.PerspectiveCamera(40,W/H,0.1,200);
  camera.position.z=2.8;

  var sol=new THREE.DirectionalLight(0xfff5e0,3.2); sol.position.set(5,3,3); scene.add(sol);
  scene.add(new THREE.AmbientLight(0x0f0f2d,1.5));

  var sv=[];
  for(var i=0;i<1200;i++){var t=Math.random()*Math.PI*2,p=Math.acos(2*Math.random()-1),r=40+Math.random()*20;sv.push(r*Math.sin(p)*Math.cos(t),r*Math.cos(p),r*Math.sin(p)*Math.sin(t));}
  var sg=new THREE.BufferGeometry(); sg.setAttribute('position',new THREE.Float32BufferAttribute(sv,3));
  var stars=new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:0.04,transparent:true,opacity:0.7}));
  scene.add(stars);

  // CORRECCIÓN DE PERSPECTIVA: Reducimos MEX_X de 0.46 a 0.28 para subir el mapa y centrar a México
  var MEX_Y=0.1658, MEX_X=0.2800;
  var tY=MEX_Y, tX=MEX_X, cY=MEX_Y, cX=MEX_X;
  var zoomT=2.8, zoomC=2.8;
  var spin=true, drag=false, prev={x:0,y:0}, intro=true;
  var R=1.0, globe, pins=[];

  function buildGlobe(tex){
    document.getElementById('gload').style.display='none';
    tex.anisotropy = Math.min(renderer.capabilities.getMaxAnisotropy(), 16);
    tex.minFilter = THREE.LinearMipmapLinearFilter;
    
    var mat=new THREE.MeshPhongMaterial({map:tex,shininess:15,specular:new THREE.Color(0x222222)});
    globe=new THREE.Mesh(new THREE.SphereGeometry(R,80,80),mat);
    globe.rotation.y=cY; globe.rotation.x=cX;
    scene.add(globe);

    var atm=new THREE.Mesh(new THREE.SphereGeometry(R*1.015,32,32),new THREE.ShaderMaterial({
      vertexShader:'varying vec3 vN;void main(){vN=normalize(normalMatrix*normal);gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}',
      fragmentShader:'varying vec3 vN;void main(){float i=pow(0.6-dot(vN,vec3(0.,0.,1.)),4.0);gl_FragColor=vec4(0.2,0.5,1.0,i*0.6);}',
      side:THREE.BackSide,blending:THREE.AdditiveBlending,transparent:true
    }));
    scene.add(atm);

    loader.load('https://raw.githubusercontent.com/turban/webgl-earth/master/images/earthbump1k.jpg',function(bumpTex){
      if(globe){ globe.material.bumpMap = bumpTex; globe.material.bumpScale = 0.015; globe.material.needsUpdate = true; }
    });

    var pinGeo=new THREE.SphereGeometry(0.018,12,12);
    var ringGeo=new THREE.RingGeometry(0.022,0.038,14);
    var pDatos=[{lat:19.29,lon:99.65},{lat:19.60,lon:99.01},{lat:19.41,lon:99.03},{lat:19.47,lon:99.24},{lat:19.19,lon:99.76}];
    
    pDatos.forEach(function(c){
      var phi=(90-c.lat)*Math.PI/180, theta=(c.lon+162.59+180)*Math.PI/180;
      var px=-(R+0.012)*Math.sin(phi)*Math.cos(theta), py=(R+0.012)*Math.cos(phi), pz=(R+0.012)*Math.sin(phi)*Math.sin(theta);
      var pin=new THREE.Mesh(pinGeo,new THREE.MeshBasicMaterial({color:0xff5500})); pin.position.set(px,py,pz);
      var ring=new THREE.Mesh(ringGeo,new THREE.MeshBasicMaterial({color:0xff7733,transparent:true,opacity:0.7,side:THREE.DoubleSide}));
      ring.position.set(px,py,pz); ring.lookAt(0,0,0);
      globe.add(pin); globe.add(ring); pins.push({pin:pin,ring:ring});
    });
  }

  var loader=new THREE.TextureLoader(); loader.crossOrigin='anonymous';
  loader.load('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg', buildGlobe);

  canvas.addEventListener('mousedown',function(e){drag=true;prev={x:e.clientX,y:e.clientY};});
  window.addEventListener('mouseup',function(){drag=false;});
  window.addEventListener('mousemove',function(e){if(!drag||!globe)return;tY+=(e.clientX-prev.x)*0.005;tX+=(e.clientY-prev.y)*0.005;tX=Math.max(-1.3,Math.min(1.3,tX));prev={x:e.clientX,y:e.clientY};});
  canvas.addEventListener('wheel',function(e){e.preventDefault();zoomT=Math.max(1.8,Math.min(3.6,zoomT+e.deltaY*0.0025));},{passive:false});

  window.goMex=function(){tY=MEX_Y;tX=MEX_X;zoomT=1.8;spin=false;document.getElementById('spb').textContent='▶ Girar';};
  window.toggleSpin=function(){spin=!spin;document.getElementById('spb').textContent=spin?'⏸ Pausar':'▶ Girar';};
  window.resetZ=function(){tY=MEX_Y;tX=MEX_X;zoomT=2.8;spin=true;document.getElementById('spb').textContent='⏸ Pausar';};

  window.addEventListener('resize', function(){
    W=wrap.clientWidth; H=wrap.clientHeight;
    camera.aspect=W/H; camera.updateProjectionMatrix();
    renderer.setSize(W,H);
  });

  var t0=performance.now();
  (function loop(){
    requestAnimationFrame(loop); if(!globe)return;
    var e=(performance.now()-t0)/1000;
    if(intro&&e<2.0){camera.position.z=5.0-(1-Math.pow(1-Math.min(1,e/1.5),3))*2.2;}
    else{intro=false;zoomC+=(zoomT-zoomC)*0.06;camera.position.z=zoomC;}
    if(spin&&!drag)tY+0.0008; // Se mantiene la velocidad constante en el ecuador inclinado
    cY+=(tY-cY)*0.08;cX+=(tX-cX)*0.08;
    globe.rotation.y=cY; globe.rotation.x=cX;
    stars.rotation.y=e*0.00002;
    renderer.render(scene,camera);
  })();
})();

function ir(id){
  document.querySelectorAll('.vista').forEach(function(v){v.classList.remove('on');});
  document.querySelectorAll('nav button').forEach(function(b){b.classList.remove('on');});
  document.getElementById('vista-'+id).classList.add('on');
  var nb=document.getElementById('nav-'+id);if(nb)nb.classList.add('on');
}
</script>
